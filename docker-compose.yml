version: "3.9"

services:
  # -----------------------------------------------------------------------
  # PostgreSQL + pgvector
  # -----------------------------------------------------------------------
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: courseuser
      POSTGRES_PASSWORD: coursepass
      POSTGRES_DB: coursedb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courseuser -d coursedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # Redis — Celery broker + result backend + progress counters
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -----------------------------------------------------------------------
  # FastAPI — main API server
  # -----------------------------------------------------------------------
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://courseuser:coursepass@db:5432/coursedb
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      S3_BUCKET: ${S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # -----------------------------------------------------------------------
  # Celery workers — document ingestion (scale horizontally as needed)
  # -----------------------------------------------------------------------
  worker:
    build: .
    command: >
      celery -A app.workers.ingestion_tasks.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=celery
    environment:
      DATABASE_URL: postgresql+asyncpg://courseuser:coursepass@db:5432/coursedb
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      S3_BUCKET: ${S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    deploy:
      replicas: 3          # 3 worker containers = 12 concurrent page tasks (4 each)

  # -----------------------------------------------------------------------
  # Flower — Celery task monitoring UI (dev only)
  # -----------------------------------------------------------------------
  flower:
    build: .
    command: celery -A app.workers.ingestion_tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

volumes:
  pgdata:
